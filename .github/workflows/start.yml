name: Start Minecraft Server (ngrok)

on:
  workflow_dispatch:

jobs:
  run-server:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # ☕ Java 21 (required for Paper 1.21)
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 🔍 Debug files
      - name: Check files
        run: ls -la

      # 🌐 Install ngrok
      - name: Install ngrok
        run: |
          curl -s https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.zip -o ngrok.zip
          unzip ngrok.zip

      # 🔐 Authenticate ngrok
      - name: Add ngrok auth token
        run: |
          ./ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}

      # 🚀 Start ngrok tunnel
      - name: Start ngrok
        run: |
          ./ngrok tcp 25565 > ngrok.log 2>&1 &
          sleep 8
          echo "====== NGROK LOG ======"
          cat ngrok.log

      # 🎮 Start Minecraft server (5 min runtime)
      - name: Start Minecraft Server
        run: |
          timeout 5m java -Xmx2G -Xms1G -jar paper-1.21.11-130.jar nogui
