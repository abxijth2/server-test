name: Start Minecraft Server

on:
  workflow_dispatch:

jobs:
  run-server:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Java
        run: sudo apt install openjdk-21-jdk -y

      - name: Start playit
        run: |
          curl -SsL https://playit.gg/install.sh | bash
          ./playit &

      - name: Start Server
        run: |
          java -Xmx2G -Xms1G -jar paper-1.21.11-130.jar nogui
